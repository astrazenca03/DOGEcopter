# Tricopter Flight Controller Configuration
# All units SI: m, kg, s, rad

vehicle:
  mass: 1.5  # kg
  # Full 3x3 inertia tensor (symmetric, 6 independent components)
  # J = [[Jxx, Jxy, Jxz],
  #       [Jxy, Jyy, Jyz],
  #       [Jxz, Jyz, Jzz]]
  inertia:
    Jxx: 0.03
    Jxy: 0.001
    Jxz: 0.0005
    Jyy: 0.025
    Jyz: 0.0008
    Jzz: 0.04

rotors:
  - name: "front"
    position: [0.25, 0.0, 0.0]        # metres from CG
    thrust_axis: [0.0, 0.0, 1.0]      # unit vector, body frame
    spin_axis: [0.0, 0.0, 1.0]        # unit vector, body frame
    spin_direction: 1                   # +1 = CW, -1 = CCW
    k_T: 1.5e-5                        # thrust coeff: T = k_T * omega^2
    k_Q: 2.5e-7                        # drag torque coeff: Q = k_Q * omega^2

  - name: "rear-left"
    position: [-0.15, 0.20, 0.0]
    thrust_axis: [0.0, 0.0, 1.0]
    spin_axis: [0.0, 0.0, 1.0]
    spin_direction: -1
    k_T: 1.5e-5
    k_Q: 2.5e-7

  - name: "rear-right"
    position: [-0.15, -0.20, 0.0]
    thrust_axis: [0.0, 0.0, 1.0]
    spin_axis: [0.0, 0.0, 1.0]
    spin_direction: 1
    k_T: 1.5e-5
    k_Q: 2.5e-7

# Inner-loop roll/pitch LQR weights (4-state system)
# Yaw is handled separately by the yaw rate damper.
attitude_lqr:
  # Q diagonal: [q_phi, q_theta, q_p, q_q]
  # Only roll/pitch angles and rates — no yaw.
  Q_diag: [100.0, 100.0, 10.0, 10.0]
  # R diagonal: [r1, r2, r3]
  R_diag: [1.0, 1.0, 1.0]

# Yaw rate damper (separate from LQR)
# Applies proportional damping to yaw rate: tau_yaw_cmd = -k_r * r
# Very light — just prevents runaway spin without fighting the
# residual yaw torque too aggressively.
yaw_damper:
  k_r: 0.01

# Outer-loop altitude PID
altitude_pid:
  Kp: 5.0
  Ki: 1.0
  Kd: 3.0
  integral_limit: 5.0
  output_limit: 10.0

# Simulation parameters
simulation:
  dt: 0.001             # integration timestep (s)
  duration: 10.0         # total sim time (s)
  # Initial attitude perturbation (degrees, converted to rad internally)
  initial_roll_deg: 5.0
  initial_pitch_deg: 3.0
  initial_yaw_deg: 0.0
  z_desired: 0.0        # desired altitude (m)
  # Impulse disturbance
  disturbance_time: 2.0          # when disturbance starts (s)
  disturbance_duration: 0.01     # how long disturbance lasts (s)
  disturbance_torque: [0.1, 0.05, 0.02]  # Nm in body frame

# Motor limits
motor:
  omega_max: 2500.0  # rad/s
